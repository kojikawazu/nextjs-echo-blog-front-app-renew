name: Pull Request Test

on:
    pull_request:
        paths:
            - '.github/**'
            - 'apps/front/**'
            - 'Dockerfile'
            - '.dockerignore'
            - 'package.json'
            - 'pnpm-lock.yaml'
            - 'pnpm-workspace.yaml'

jobs:
    test:
        uses: ./.github/workflows/test.yml
        secrets: inherit
