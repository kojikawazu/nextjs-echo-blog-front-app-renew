name: Test Workflow

on:
  workflow_call:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test
    strategy:
      matrix:
        test_dir: [
          e2e/tests/smoke/*,
          e2e/tests/layout/*,
          e2e/tests/pages/auth/*,
          e2e/tests/pages/blog_detail/*,
          e2e/tests/pages/blog_edit_form/*,
          e2e/tests/pages/blog_home/*,
          e2e/tests/pages/blog_new_form/*,
          e2e/tests/pages/category/*,
          e2e/tests/pages/tag/*,
        ]

    steps:
      - uses: actions/checkout@v3

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Create .env.test file
        run: |
          echo NEXT_PUBLIC_VISIT_ID_KEY=${{ secrets.NEXT_PUBLIC_VISIT_ID_KEY }} > .env.test
          echo BACKEND_API_URL=${{ secrets.BACKEND_API_URL }} >> .env.test
          echo ALLOWED_REPO_OWNER=${{ secrets.ALLOWED_REPO_OWNER }} >> .env.test

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        env:
          TEST_DIR: ${{ matrix.test_dir }}
        run: pnpm test:e2e -- $TEST_DIR

      - name: Generate valid artifact name
        env:
          TEST_DIR: ${{ matrix.test_dir }}
        run: echo "ARTIFACT_NAME=$(echo "$TEST_DIR" | sed 's|/\*$||' | sed 's|/|-|g')" >> $GITHUB_ENV

      - name: Save Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ env.ARTIFACT_NAME }}
          path: playwright-report/

      - name: Remove .env.test file
        if: always()
        run: rm .env.test
